name: Environment Health Check

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - prod
          - staging

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: prod
            ssh_key_secret: PROD_SSH_PRIVATE_KEY
            vm_ip_secret: PROD_AZURE_VM_IP
            vm_user_secret: PROD_AZURE_VM_USER
          - env: staging
            ssh_key_secret: STAGING_SSH_PRIVATE_KEY
            vm_ip_secret: STAGING_AZURE_VM_IP
            vm_user_secret: STAGING_AZURE_VM_USER

    steps:
      - name: Check if should run (${{ matrix.env }})
        id: should_run
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" == "both" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" == "${{ matrix.env }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Skipping ${{ matrix.env }} - user selected ${{ github.event.inputs.environment }}"
          fi

      - name: Setup SSH
        if: steps.should_run.outputs.run == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets[matrix.ssh_key_secret] }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets[matrix.vm_ip_secret] }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Check PM2 Processes (${{ matrix.env }})
        if: steps.should_run.outputs.run == 'true'
        id: pm2
        run: |
          echo "## [${{ matrix.env }}] PM2 Process Status" >> $GITHUB_STEP_SUMMARY

          PM2_STATUS=$(ssh -o ConnectTimeout=10 ${{ secrets[matrix.vm_user_secret] }}@${{ secrets[matrix.vm_ip_secret] }} \
            "source ~/.nvm/nvm.sh && pm2 jlist" 2>/dev/null || echo "[]")

          # Only show safe fields (name, status, uptime, restarts) - NOT environment variables
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$PM2_STATUS" | jq '[.[] | {name: .name, status: .pm2_env.status, uptime: .pm2_env.pm_uptime, restarts: .pm2_env.restart_time}]' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "[]" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          WORKER_STATUS=$(echo "$PM2_STATUS" | jq -r '.[] | select(.name=="dw_worker") | .pm2_env.status' 2>/dev/null || echo "unknown")
          GATEWAY_STATUS=$(echo "$PM2_STATUS" | jq -r '.[] | select(.name=="dw_gateway") | .pm2_env.status' 2>/dev/null || echo "unknown")

          echo "worker_status=$WORKER_STATUS" >> $GITHUB_OUTPUT
          echo "gateway_status=$GATEWAY_STATUS" >> $GITHUB_OUTPUT

          if [[ "$WORKER_STATUS" != "online" ]]; then
            echo "::error::[${{ matrix.env }}] dw_worker is not online (status: $WORKER_STATUS)"
          fi
          if [[ "$GATEWAY_STATUS" != "online" ]]; then
            echo "::error::[${{ matrix.env }}] dw_gateway is not online (status: $GATEWAY_STATUS)"
          fi

      - name: Check Health Endpoints (${{ matrix.env }})
        if: steps.should_run.outputs.run == 'true'
        id: endpoints
        run: |
          echo "## [${{ matrix.env }}] Health Endpoints" >> $GITHUB_STEP_SUMMARY

          WORKER_HEALTH=$(ssh -o ConnectTimeout=10 ${{ secrets[matrix.vm_user_secret] }}@${{ secrets[matrix.vm_ip_secret] }} \
            "curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:9001/health" 2>/dev/null || echo "000")

          GATEWAY_HEALTH=$(ssh -o ConnectTimeout=10 ${{ secrets[matrix.vm_user_secret] }}@${{ secrets[matrix.vm_ip_secret] }} \
            "curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:9100/health" 2>/dev/null || echo "000")

          echo "| Service | Port | HTTP Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| rust_service | 9001 | $WORKER_HEALTH |" >> $GITHUB_STEP_SUMMARY
          echo "| gateway | 9100 | $GATEWAY_HEALTH |" >> $GITHUB_STEP_SUMMARY

          echo "worker_health=$WORKER_HEALTH" >> $GITHUB_OUTPUT
          echo "gateway_health=$GATEWAY_HEALTH" >> $GITHUB_OUTPUT

          if [[ "$WORKER_HEALTH" != "200" ]]; then
            echo "::error::[${{ matrix.env }}] rust_service health check failed (HTTP $WORKER_HEALTH)"
          fi
          if [[ "$GATEWAY_HEALTH" != "200" ]]; then
            echo "::error::[${{ matrix.env }}] gateway health check failed (HTTP $GATEWAY_HEALTH)"
          fi

      - name: Check MongoDB Connection (${{ matrix.env }})
        if: steps.should_run.outputs.run == 'true'
        id: mongodb
        run: |
          echo "## [${{ matrix.env }}] MongoDB Status" >> $GITHUB_STEP_SUMMARY

          MONGO_CHECK=$(ssh -o ConnectTimeout=10 ${{ secrets[matrix.vm_user_secret] }}@${{ secrets[matrix.vm_ip_secret] }} << 'EOF'
            ENV_FILE="/home/azureuser/server/DoWhiz/DoWhiz_service/.env"
            STORAGE_BACKEND=$(grep -E "^STORAGE_BACKEND=" "$ENV_FILE" 2>/dev/null | cut -d= -f2 || echo "unknown")
            echo "Storage Backend: $STORAGE_BACKEND"

            if grep -qE "^MONGODB_URI=" "$ENV_FILE" 2>/dev/null; then
              echo "MongoDB URI: configured"

              MONGODB_URI=$(grep -E "^MONGODB_URI=" "$ENV_FILE" | cut -d= -f2)
              if command -v mongosh &>/dev/null; then
                if mongosh "$MONGODB_URI" --eval "db.runCommand({ping:1})" --quiet 2>/dev/null | grep -q "ok"; then
                  echo "MongoDB Connection: OK"
                  echo "MONGO_HEALTHY"
                else
                  echo "MongoDB Connection: FAILED"
                  echo "MONGO_UNHEALTHY"
                fi
              elif command -v mongo &>/dev/null; then
                if mongo "$MONGODB_URI" --eval "db.runCommand({ping:1})" --quiet 2>/dev/null | grep -q "ok"; then
                  echo "MongoDB Connection: OK"
                  echo "MONGO_HEALTHY"
                else
                  echo "MongoDB Connection: FAILED"
                  echo "MONGO_UNHEALTHY"
                fi
              else
                echo "MongoDB Connection: skipped (no mongosh/mongo client)"
                echo "MONGO_SKIPPED"
              fi
            else
              echo "MongoDB URI: not configured in $ENV_FILE"
              echo "MONGO_NOT_CONFIGURED"
            fi
          EOF
          )

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$MONGO_CHECK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [[ "$MONGO_CHECK" == *"MONGO_UNHEALTHY"* ]]; then
            echo "::error::[${{ matrix.env }}] MongoDB connection failed"
            echo "mongo_healthy=false" >> $GITHUB_OUTPUT
          elif [[ "$MONGO_CHECK" == *"MONGO_HEALTHY"* ]]; then
            echo "mongo_healthy=true" >> $GITHUB_OUTPUT
          else
            echo "mongo_healthy=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Check Legacy DB Remnants (${{ matrix.env }})
        if: steps.should_run.outputs.run == 'true'
        id: legacy_db_remnants
        run: |
          echo "## [${{ matrix.env }}] Legacy DB Remnants Check" >> $GITHUB_STEP_SUMMARY

          LEGACY_DB_CHECK=$(ssh -o ConnectTimeout=10 ${{ secrets[matrix.vm_user_secret] }}@${{ secrets[matrix.vm_ip_secret] }} << 'EOF'
            STATE_DIR="/home/azureuser/server/.dowhiz/DoWhiz/run_task/little_bear/state"
            USERS_DIR="/home/azureuser/server/.dowhiz/DoWhiz/run_task/little_bear/users"
            ENV_FILE="/home/azureuser/server/DoWhiz/DoWhiz_service/.env"

            STORAGE_BACKEND=$(grep -E "^STORAGE_BACKEND=" "$ENV_FILE" 2>/dev/null | cut -d= -f2 || echo "not_set")
            echo "### Configuration"
            echo "STORAGE_BACKEND=$STORAGE_BACKEND"

            if [[ "$STORAGE_BACKEND" != "mongo" && "$STORAGE_BACKEND" != "mongodb" ]]; then
              echo "WARNING: STORAGE_BACKEND is not set to 'mongo' - Legacy DB fallback may be active"
              echo "LEGACY_DB_FALLBACK_RISK"
            fi

            echo ""
            echo "### Legacy DB Files in State Directory"
            EXPECTED_DBS="users.db task_index.db slack.db ingestion.db"

            if [[ -d "$STATE_DIR" ]]; then
              echo "| File | Size | Status |"
              echo "|------|------|--------|"

              for db in "$STATE_DIR"/*.db; do
                [[ -e "$db" ]] || continue
                BASENAME=$(basename "$db")
                SIZE=$(stat -c%s "$db" 2>/dev/null || echo "0")

                if echo "$EXPECTED_DBS" | grep -qw "$BASENAME"; then
                  if [[ "$SIZE" -eq 0 ]]; then
                    echo "| $BASENAME | ${SIZE}B | EXPECTED but CORRUPTED (zero-byte) |"
                  else
                    echo "| $BASENAME | ${SIZE}B | EXPECTED (legacy) |"
                  fi
                else
                  echo "| $BASENAME | ${SIZE}B | UNEXPECTED - should not be Legacy DB |"
                  echo "UNEXPECTED_LEGACY_DB_FILE"
                fi
              done

              if ls "$STATE_DIR"/*.db 1>/dev/null 2>&1; then
                echo "LEGACY_DB_FILES_EXIST"
              else
                echo "No Legacy DB files found"
              fi
            else
              echo "State directory not found"
            fi

            echo ""
            echo "### Stale Journal/WAL Files"
            JOURNALS=$(find "$STATE_DIR" -maxdepth 1 \( -name "*.db-journal" -o -name "*.db-wal" -o -name "*.db-shm" \) 2>/dev/null)
            if [[ -n "$JOURNALS" ]]; then
              echo "STALE_JOURNALS_FOUND"
              ls -la $JOURNALS 2>/dev/null
            else
              echo "No stale journal files"
            fi

            echo ""
            echo "### CIFS Lock Status"
            if mount | grep -q "dowhiz-run-task"; then
              echo "CIFS mount: active"

              LOCK_PROCS=$(lsof +D "$STATE_DIR" 2>/dev/null | grep -E "\.db" | head -10 || echo "")
              if [[ -n "$LOCK_PROCS" ]]; then
                echo "Processes holding DB file locks:"
                echo "$LOCK_PROCS"
                echo "CIFS_LOCKS_HELD"
              else
                echo "No processes holding DB locks"
              fi

              CIFS_LOCKS=$(grep -i "cifs" /proc/locks 2>/dev/null | head -5 || echo "")
              if [[ -n "$CIFS_LOCKS" ]]; then
                echo "Kernel CIFS locks detected:"
                echo "$CIFS_LOCKS"
                echo "CIFS_KERNEL_LOCKS"
              else
                echo "No kernel CIFS locks"
              fi
            else
              echo "CIFS mount: not active (good - using MongoDB)"
            fi

            echo ""
            echo "### Recent Legacy DB Errors in Logs"
            if [[ -f ~/.nvm/nvm.sh ]]; then
              source ~/.nvm/nvm.sh 2>/dev/null
              LEGACY_DB_ERRORS=$(pm2 logs --nostream --lines 50 2>&1 | grep -i "legacy_db\|database is locked" | tail -5)
              if [[ -n "$LEGACY_DB_ERRORS" ]]; then
                echo "Recent Legacy DB-related errors:"
                echo "$LEGACY_DB_ERRORS"
                echo "LEGACY_DB_ERRORS_IN_LOGS"
              else
                echo "No recent Legacy DB errors"
              fi
            fi
          EOF
          )

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$LEGACY_DB_CHECK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [[ "$LEGACY_DB_CHECK" == *"LEGACY_DB_ERRORS_IN_LOGS"* ]]; then
            echo "::error::[${{ matrix.env }}] Legacy DB errors found in recent logs"
            echo "legacy_db_status=errors" >> $GITHUB_OUTPUT
          elif [[ "$LEGACY_DB_CHECK" == *"CIFS_LOCKS_HELD"* ]]; then
            echo "::warning::[${{ matrix.env }}] CIFS locks held on Legacy DB files"
            echo "legacy_db_status=cifs_locks" >> $GITHUB_OUTPUT
          elif [[ "$LEGACY_DB_CHECK" == *"STALE_JOURNALS_FOUND"* ]]; then
            echo "::warning::[${{ matrix.env }}] Stale Legacy DB journal files found"
            echo "legacy_db_status=stale_journals" >> $GITHUB_OUTPUT
          elif [[ "$LEGACY_DB_CHECK" == *"UNEXPECTED_LEGACY_DB_FILE"* ]]; then
            echo "::warning::[${{ matrix.env }}] Unexpected Legacy DB file found"
            echo "legacy_db_status=unexpected_file" >> $GITHUB_OUTPUT
          elif [[ "$LEGACY_DB_CHECK" == *"LEGACY_DB_FALLBACK_RISK"* ]]; then
            echo "::warning::[${{ matrix.env }}] STORAGE_BACKEND not set to mongo"
            echo "legacy_db_status=fallback_risk" >> $GITHUB_OUTPUT
          else
            echo "legacy_db_status=ok" >> $GITHUB_OUTPUT
          fi

      - name: Check User Tasks DB Corruption (${{ matrix.env }})
        if: steps.should_run.outputs.run == 'true'
        id: tasks_corruption
        run: |
          echo "## [${{ matrix.env }}] Per-User Tasks DB Corruption Check" >> $GITHUB_STEP_SUMMARY

          CORRUPTION_CHECK=$(ssh -o ConnectTimeout=30 ${{ secrets[matrix.vm_user_secret] }}@${{ secrets[matrix.vm_ip_secret] }} << 'EOF'
            USERS_DIR="/home/azureuser/server/.dowhiz/DoWhiz/run_task/little_bear/users"

            if [[ ! -d "$USERS_DIR" ]]; then
              echo "Users directory not found"
              echo "USERS_DIR_MISSING"
              exit 0
            fi

            TOTAL=0
            CORRUPTED=0
            HEALTHY=0
            MISSING=0

            for user_dir in "$USERS_DIR"/*/; do
              [[ -d "$user_dir" ]] || continue
              TOTAL=$((TOTAL + 1))
              tasks_db="$user_dir/state/tasks.db"

              if [[ -f "$tasks_db" ]]; then
                size=$(stat -c%s "$tasks_db" 2>/dev/null || echo "0")
                if [[ "$size" -eq 0 ]]; then
                  CORRUPTED=$((CORRUPTED + 1))
                else
                  HEALTHY=$((HEALTHY + 1))
                fi
              else
                MISSING=$((MISSING + 1))
              fi
            done

            echo "| Status | Count |"
            echo "|--------|-------|"
            echo "| Total users | $TOTAL |"
            echo "| Healthy tasks.db | $HEALTHY |"
            echo "| Corrupted (0 bytes) | $CORRUPTED |"
            echo "| Missing tasks.db | $MISSING |"

            if [[ "$CORRUPTED" -gt 0 ]]; then
              PERCENT=$((CORRUPTED * 100 / TOTAL))
              echo ""
              echo "Corruption rate: ${PERCENT}%"
              echo "TASKS_DB_CORRUPTED:$CORRUPTED"
            else
              echo "TASKS_DB_HEALTHY"
            fi
          EOF
          )

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CORRUPTION_CHECK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [[ "$CORRUPTION_CHECK" == *"TASKS_DB_CORRUPTED"* ]]; then
            CORRUPTED_COUNT=$(echo "$CORRUPTION_CHECK" | grep "TASKS_DB_CORRUPTED" | cut -d: -f2)
            echo "::error::[${{ matrix.env }}] $CORRUPTED_COUNT users have corrupted tasks.db files"
            echo "tasks_corruption=corrupted" >> $GITHUB_OUTPUT
            echo "corrupted_count=$CORRUPTED_COUNT" >> $GITHUB_OUTPUT
          elif [[ "$CORRUPTION_CHECK" == *"USERS_DIR_MISSING"* ]]; then
            echo "tasks_corruption=missing_dir" >> $GITHUB_OUTPUT
          else
            echo "tasks_corruption=healthy" >> $GITHUB_OUTPUT
          fi

      - name: Check Disk Space (${{ matrix.env }})
        if: steps.should_run.outputs.run == 'true'
        id: disk
        run: |
          echo "## [${{ matrix.env }}] Disk Space" >> $GITHUB_STEP_SUMMARY

          DISK_CHECK=$(ssh -o ConnectTimeout=10 ${{ secrets[matrix.vm_user_secret] }}@${{ secrets[matrix.vm_ip_secret] }} \
            "df -h / /home/azureuser/server 2>/dev/null | tail -n +2" 2>/dev/null || echo "unknown")

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$DISK_CHECK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if echo "$DISK_CHECK" | awk '{print $5}' | grep -qE "^9[0-9]%|^100%"; then
            echo "::warning::[${{ matrix.env }}] Disk usage above 90%"
            echo "disk_ok=false" >> $GITHUB_OUTPUT
          else
            echo "disk_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Summary (${{ matrix.env }})
        if: always() && steps.should_run.outputs.run == 'true'
        run: |
          echo "## [${{ matrix.env }}] Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Worker PM2 | ${{ steps.pm2.outputs.worker_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway PM2 | ${{ steps.pm2.outputs.gateway_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker HTTP | ${{ steps.endpoints.outputs.worker_health }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway HTTP | ${{ steps.endpoints.outputs.gateway_health }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MongoDB | ${{ steps.mongodb.outputs.mongo_healthy }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Legacy DB Remnants | ${{ steps.legacy_db_remnants.outputs.legacy_db_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tasks DB Corruption | ${{ steps.tasks_corruption.outputs.tasks_corruption }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Disk Space | ${{ steps.disk.outputs.disk_ok }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if Critical Issues (${{ matrix.env }})
        if: |
          steps.should_run.outputs.run == 'true' &&
          matrix.env == 'prod' && (
            steps.endpoints.outputs.worker_health != '200' ||
            steps.endpoints.outputs.gateway_health != '200' ||
            steps.mongodb.outputs.mongo_healthy == 'false' ||
            steps.legacy_db_remnants.outputs.legacy_db_status == 'errors' ||
            steps.tasks_corruption.outputs.tasks_corruption == 'corrupted'
          )
        run: |
          echo "Critical health check failures detected on ${{ matrix.env }}!"
          echo "Worker Health: ${{ steps.endpoints.outputs.worker_health }}"
          echo "Gateway Health: ${{ steps.endpoints.outputs.gateway_health }}"
          echo "MongoDB: ${{ steps.mongodb.outputs.mongo_healthy }}"
          echo "Legacy DB Status: ${{ steps.legacy_db_remnants.outputs.legacy_db_status }}"
          echo "Tasks DB Corruption: ${{ steps.tasks_corruption.outputs.tasks_corruption }} (count: ${{ steps.tasks_corruption.outputs.corrupted_count }})"
          exit 1

