name: Production Health Check

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_AZURE_VM_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Check PM2 Processes
        id: pm2
        run: |
          echo "## PM2 Process Status" >> $GITHUB_STEP_SUMMARY

          PM2_STATUS=$(ssh -o ConnectTimeout=10 ${{ secrets.PROD_AZURE_VM_USER }}@${{ secrets.PROD_AZURE_VM_IP }} \
            "source ~/.nvm/nvm.sh && pm2 jlist" 2>/dev/null || echo "[]")

          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$PM2_STATUS" | jq '.' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "$PM2_STATUS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Check if dw_worker is online
          WORKER_STATUS=$(echo "$PM2_STATUS" | jq -r '.[] | select(.name=="dw_worker") | .pm2_env.status' 2>/dev/null || echo "unknown")
          GATEWAY_STATUS=$(echo "$PM2_STATUS" | jq -r '.[] | select(.name=="dw_gateway") | .pm2_env.status' 2>/dev/null || echo "unknown")

          echo "worker_status=$WORKER_STATUS" >> $GITHUB_OUTPUT
          echo "gateway_status=$GATEWAY_STATUS" >> $GITHUB_OUTPUT

          if [[ "$WORKER_STATUS" != "online" ]]; then
            echo "::error::dw_worker is not online (status: $WORKER_STATUS)"
          fi
          if [[ "$GATEWAY_STATUS" != "online" ]]; then
            echo "::error::dw_gateway is not online (status: $GATEWAY_STATUS)"
          fi

      - name: Check Health Endpoints
        id: endpoints
        run: |
          echo "## Health Endpoints" >> $GITHUB_STEP_SUMMARY

          # Check rust_service (port 9001)
          WORKER_HEALTH=$(ssh -o ConnectTimeout=10 ${{ secrets.PROD_AZURE_VM_USER }}@${{ secrets.PROD_AZURE_VM_IP }} \
            "curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:9001/health" 2>/dev/null || echo "000")

          # Check gateway (port 9100)
          GATEWAY_HEALTH=$(ssh -o ConnectTimeout=10 ${{ secrets.PROD_AZURE_VM_USER }}@${{ secrets.PROD_AZURE_VM_IP }} \
            "curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:9100/health" 2>/dev/null || echo "000")

          echo "| Service | Port | HTTP Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| rust_service | 9001 | $WORKER_HEALTH |" >> $GITHUB_STEP_SUMMARY
          echo "| gateway | 9100 | $GATEWAY_HEALTH |" >> $GITHUB_STEP_SUMMARY

          echo "worker_health=$WORKER_HEALTH" >> $GITHUB_OUTPUT
          echo "gateway_health=$GATEWAY_HEALTH" >> $GITHUB_OUTPUT

          if [[ "$WORKER_HEALTH" != "200" ]]; then
            echo "::error::rust_service health check failed (HTTP $WORKER_HEALTH)"
          fi
          if [[ "$GATEWAY_HEALTH" != "200" ]]; then
            echo "::error::gateway health check failed (HTTP $GATEWAY_HEALTH)"
          fi

      - name: Check CIFS Mount
        id: cifs
        run: |
          echo "## CIFS Mount Status" >> $GITHUB_STEP_SUMMARY

          MOUNT_CHECK=$(ssh -o ConnectTimeout=10 ${{ secrets.PROD_AZURE_VM_USER }}@${{ secrets.PROD_AZURE_VM_IP }} \
            "mount | grep dowhiz-run-task-prod && echo 'MOUNTED' || echo 'NOT_MOUNTED'" 2>/dev/null)

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$MOUNT_CHECK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [[ "$MOUNT_CHECK" != *"MOUNTED"* ]]; then
            echo "::error::CIFS mount dowhiz-run-task-prod is not mounted!"
            echo "cifs_mounted=false" >> $GITHUB_OUTPUT
          else
            echo "cifs_mounted=true" >> $GITHUB_OUTPUT
          fi

      - name: Check CIFS Locks
        id: cifs_locks
        run: |
          echo "## CIFS Lock Status" >> $GITHUB_STEP_SUMMARY

          LOCK_CHECK=$(ssh -o ConnectTimeout=10 ${{ secrets.PROD_AZURE_VM_USER }}@${{ secrets.PROD_AZURE_VM_IP }} << 'EOF'
            STATE_DIR="/home/azureuser/server/.dowhiz/DoWhiz/run_task/little_bear/state"
            MOUNT_POINT="/home/azureuser/server/.dowhiz/DoWhiz/run_task"

            echo "### Stale Journal/WAL Files"
            JOURNALS=$(find "$STATE_DIR" -maxdepth 1 \( -name "*.db-journal" -o -name "*.db-wal" -o -name "*.db-shm" \) 2>/dev/null)
            if [[ -n "$JOURNALS" ]]; then
              echo "STALE_LOCKS_FOUND"
              echo '```'
              ls -la $JOURNALS 2>/dev/null
              echo '```'
            else
              echo "None found"
            fi

            echo ""
            echo "### Processes Holding Locks"
            # Check for processes with open file handles on the mount
            LOCK_PROCS=$(lsof +D "$MOUNT_POINT" 2>/dev/null | grep -E "\.db" | head -20 || echo "")
            if [[ -n "$LOCK_PROCS" ]]; then
              echo '```'
              echo "$LOCK_PROCS"
              echo '```'
            else
              echo "No processes holding DB locks"
            fi

            echo ""
            echo "### Kernel CIFS Locks"
            # Check /proc/locks for CIFS-related locks
            CIFS_LOCKS=$(grep -i "cifs\|dowhiz" /proc/locks 2>/dev/null | head -10 || echo "")
            if [[ -n "$CIFS_LOCKS" ]]; then
              echo "CIFS_KERNEL_LOCKS"
              echo '```'
              echo "$CIFS_LOCKS"
              echo '```'
            else
              echo "No kernel CIFS locks detected"
            fi
          EOF
          )

          echo "$LOCK_CHECK" >> $GITHUB_STEP_SUMMARY

          if [[ "$LOCK_CHECK" == *"STALE_LOCKS_FOUND"* ]]; then
            echo "::warning::Stale SQLite journal/WAL files detected on CIFS mount"
            echo "stale_locks=true" >> $GITHUB_OUTPUT
          else
            echo "stale_locks=false" >> $GITHUB_OUTPUT
          fi

      - name: Check SQLite Files
        id: sqlite
        run: |
          echo "## SQLite Database Status" >> $GITHUB_STEP_SUMMARY

          SQLITE_CHECK=$(ssh -o ConnectTimeout=10 ${{ secrets.PROD_AZURE_VM_USER }}@${{ secrets.PROD_AZURE_VM_IP }} << 'EOF'
            STATE_DIR="/home/azureuser/server/.dowhiz/DoWhiz/run_task/little_bear/state"

            echo "| File | Size | Status |"
            echo "|------|------|--------|"

            for db in users.db task_index.db slack.db; do
              FILE="$STATE_DIR/$db"
              if [[ -f "$FILE" ]]; then
                SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "0")
                if [[ "$SIZE" -eq 0 ]]; then
                  echo "| $db | ${SIZE}B | CORRUPTED (zero-byte) |"
                else
                  # Try to open with sqlite3
                  if sqlite3 "$FILE" "SELECT 1;" >/dev/null 2>&1; then
                    echo "| $db | ${SIZE}B | OK |"
                  else
                    echo "| $db | ${SIZE}B | LOCKED/ERROR |"
                  fi
                fi
              else
                echo "| $db | - | MISSING |"
              fi
            done
          EOF
          )

          echo "$SQLITE_CHECK" >> $GITHUB_STEP_SUMMARY

          if [[ "$SQLITE_CHECK" == *"CORRUPTED"* ]] || [[ "$SQLITE_CHECK" == *"LOCKED"* ]]; then
            echo "::warning::SQLite database issues detected"
            echo "sqlite_healthy=false" >> $GITHUB_OUTPUT
          else
            echo "sqlite_healthy=true" >> $GITHUB_OUTPUT
          fi

      - name: Check Recent Errors
        run: |
          echo "## Recent Errors (last 5 min)" >> $GITHUB_STEP_SUMMARY

          ERRORS=$(ssh -o ConnectTimeout=10 ${{ secrets.PROD_AZURE_VM_USER }}@${{ secrets.PROD_AZURE_VM_IP }} \
            "source ~/.nvm/nvm.sh && pm2 logs --nostream --lines 100 2>&1 | grep -i 'error\|locked\|failed' | tail -20" 2>/dev/null || echo "No recent errors")

          if [[ -n "$ERRORS" && "$ERRORS" != "No recent errors" ]]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$ERRORS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No recent errors found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker PM2**: ${{ steps.pm2.outputs.worker_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Gateway PM2**: ${{ steps.pm2.outputs.gateway_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker HTTP**: ${{ steps.endpoints.outputs.worker_health }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Gateway HTTP**: ${{ steps.endpoints.outputs.gateway_health }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CIFS Mounted**: ${{ steps.cifs.outputs.cifs_mounted }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Stale CIFS Locks**: ${{ steps.cifs_locks.outputs.stale_locks }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SQLite Healthy**: ${{ steps.sqlite.outputs.sqlite_healthy }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if Critical Issues
        if: |
          steps.endpoints.outputs.worker_health != '200' ||
          steps.cifs.outputs.cifs_mounted == 'false' ||
          steps.cifs_locks.outputs.stale_locks == 'true'
        run: |
          echo "Critical health check failures detected!"
          echo "Worker Health: ${{ steps.endpoints.outputs.worker_health }}"
          echo "CIFS Mounted: ${{ steps.cifs.outputs.cifs_mounted }}"
          echo "Stale Locks: ${{ steps.cifs_locks.outputs.stale_locks }}"
          exit 1

  notify-on-failure:
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        run: |
          echo "Health check failed! Check the workflow run for details."
          # Add Slack/Discord/Email notification here if needed
          # Example for Slack:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"DoWhiz Production Health Check Failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
