name: CICD_production

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cicd-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    env:
      CARGO_INCREMENTAL: 0

    defaults:
      run:
        working-directory: DoWhiz_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests (scheduler_module)
        run: cargo test --locked -p scheduler_module
        continue-on-error: true

      - name: Run tests (run_task_module)
        run: cargo test --locked -p run_task_module
        continue-on-error: true

      - name: Build release binaries
        run: cargo build --locked -p scheduler_module --bins --release

      - name: Archive rust binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          compression-level: 0
          path: |
            DoWhiz_service/target/release/rust_service
            DoWhiz_service/target/release/inbound_gateway
            DoWhiz_service/target/release/set_postmark_inbound_hook
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Download rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: ./rust-binaries

      - name: Create SSH Directory
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: Decode SSH Private Key
        run: |
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/private_key.pem
          chmod 600 ~/.ssh/private_key.pem

      - name: Add Azure VM to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.PROD_AZURE_VM_IP }} >> ~/.ssh/known_hosts

      - name: Create SSH config file
        run: |
          echo "Host azureproduction" >> ~/.ssh/config
          echo "  HostName ${{ secrets.PROD_AZURE_VM_IP }}" >> ~/.ssh/config
          echo "  User ${{ secrets.PROD_AZURE_VM_USER }}" >> ~/.ssh/config
          echo "  Port 22" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/private_key.pem" >> ~/.ssh/config

      - name: Update repo on Azure VM
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          cd /home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz
          git checkout -f
          git checkout main
          git pull
          mkdir -p /home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service/target/release
          EOF

      - name: Ensure release directory is writable
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          RELEASE_DIR=/home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service/target/release
          mkdir -p "$RELEASE_DIR"
          chmod u+rwx "$RELEASE_DIR"
          EOF

      - name: Upload rust binaries to Azure VM (tmp)
        run: |
          ssh -F ~/.ssh/config azureproduction "mkdir -p /tmp/dowhiz-release"
          scp -F ~/.ssh/config ./rust-binaries/* azureproduction:/tmp/dowhiz-release/

      - name: Install rust binaries on Azure VM
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          RELEASE_DIR=/home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service/target/release
          install -m 755 /tmp/dowhiz-release/rust_service "$RELEASE_DIR/rust_service"
          install -m 755 /tmp/dowhiz-release/inbound_gateway "$RELEASE_DIR/inbound_gateway"
          install -m 755 /tmp/dowhiz-release/set_postmark_inbound_hook "$RELEASE_DIR/set_postmark_inbound_hook"
          rm -rf /tmp/dowhiz-release
          EOF

      - name: Write production .env on Azure VM
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          APP_DIR=/home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service
          mkdir -p "$APP_DIR"
          COMMON_ENV_FILE="$APP_DIR/.env.common.tmp"
          TARGET_ENV_FILE="$APP_DIR/.env.target.tmp"
          cat << 'ENV_COMMON_EOF' > "$COMMON_ENV_FILE"
          ${{ secrets.ENV_COMMON }}
          ENV_COMMON_EOF
          cat << 'ENV_TARGET_EOF' > "$TARGET_ENV_FILE"
          ${{ secrets.ENV_PROD }}
          ENV_TARGET_EOF

          ENV_FILE="$APP_DIR/.env"
          # Merge key/value pairs with target env taking precedence over common env.
          awk '
            function trim(value) {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", value);
              return value;
            }
            {
              line = $0;
              sub(/\r$/, "", line);
              if (line ~ /^[[:space:]]*($|#)/) next;
              if (line ~ /^export[[:space:]]+/) sub(/^export[[:space:]]+/, "", line);
              pos = index(line, "=");
              if (pos == 0) next;
              key = trim(substr(line, 1, pos - 1));
              if (key == "") next;
              value = substr(line, pos + 1);
              if (!(key in seen)) {
                seen[key] = 1;
                order[++count] = key;
              }
              env[key] = value;
            }
            END {
              for (i = 1; i <= count; i++) {
                key = order[i];
                print key "=" env[key];
              }
            }
          ' "$COMMON_ENV_FILE" "$TARGET_ENV_FILE" > "$ENV_FILE"
          rm -f "$COMMON_ENV_FILE" "$TARGET_ENV_FILE"

          if grep -Eq '^(STAGING_|PROD_)' "$ENV_FILE"; then
            echo "ERROR: Prefixed env keys are not allowed in deployment .env" >&2
            grep -En '^(STAGING_|PROD_)' "$ENV_FILE" >&2 || true
            exit 1
          fi
          chmod 600 "$APP_DIR/.env"
          EOF

      - name: Restart DoWhiz services before ACI build
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          if [ -s /home/${{ secrets.PROD_AZURE_VM_USER }}/.nvm/nvm.sh ]; then
            source /home/${{ secrets.PROD_AZURE_VM_USER }}/.nvm/nvm.sh
          fi
          APP_DIR=/home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service
          ENV_FILE="$APP_DIR/.env"
          set -a
          source "$ENV_FILE"
          set +a

          if pm2 describe dw_worker >/dev/null 2>&1; then
            pm2 restart dw_worker --update-env
          else
            pm2 start "$APP_DIR/target/release/rust_service" --name dw_worker --cwd "$APP_DIR" -- --host 0.0.0.0 --port "${RUST_SERVICE_PORT:-9001}"
          fi

          if pm2 describe dw_gateway >/dev/null 2>&1; then
            pm2 restart dw_gateway --update-env
          else
            pm2 start "$APP_DIR/target/release/inbound_gateway" --name dw_gateway --cwd "$APP_DIR"
          fi

          wait_for_health() {
            local label="$1"
            local url="$2"
            local http_code=""
            local attempt
            for attempt in $(seq 1 12); do
              http_code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 8 --max-time 15 "$url" || true)"
              if [[ "$http_code" == "200" ]]; then
                printf '%s' "$http_code"
                return 0
              fi
              echo "Waiting for $label health endpoint (${attempt}/12), last HTTP ${http_code:-000}..."
              sleep 5
            done
            echo "Early $label health check failed after retries (HTTP ${http_code:-000})" >&2
            return 1
          }

          worker_health="$(wait_for_health worker "http://127.0.0.1:${RUST_SERVICE_PORT:-9001}/health")"
          gateway_health="$(wait_for_health gateway "http://127.0.0.1:${GATEWAY_PORT:-9100}/health")"
          echo "Early health check passed: worker=$worker_health gateway=$gateway_health"
          EOF

      - name: Build and push ACI image on Azure VM
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          APP_ROOT=/home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz
          APP_DIR="$APP_ROOT/DoWhiz_service"
          ENV_FILE="$APP_DIR/.env"
          read_env_value() {
            local key="$1"
            local value
            value="$(grep -E "^${key}=" "$ENV_FILE" | tail -n1 | cut -d= -f2- || true)"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            printf '%s' "$value"
          }

          run_task_backend="$(read_env_value RUN_TASK_EXECUTION_BACKEND)"
          deploy_target="$(read_env_value DEPLOY_TARGET)"
          should_build=0
          case "$run_task_backend" in
            azure_aci)
              should_build=1
              ;;
            auto)
              if [[ "$deploy_target" == "staging" || "$deploy_target" == "production" ]]; then
                should_build=1
              fi
              ;;
          esac
          if [[ "$should_build" -eq 0 ]]; then
            echo "Skipping ACI image build: RUN_TASK_EXECUTION_BACKEND=$run_task_backend DEPLOY_TARGET=$deploy_target"
            exit 0
          fi

          run_task_image="$(read_env_value RUN_TASK_AZURE_ACI_IMAGE)"
          [[ -n "$run_task_image" ]] || {
            echo "RUN_TASK_AZURE_ACI_IMAGE is required when Azure ACI backend is enabled" >&2
            exit 1
          }
          login_server="${run_task_image%%/*}"
          image_name="${run_task_image#*/}"
          if [[ "$login_server" == "$run_task_image" || -z "$image_name" ]]; then
            echo "Invalid RUN_TASK_AZURE_ACI_IMAGE: $run_task_image" >&2
            exit 1
          fi
          registry_name="${login_server%%.*}"
          [[ -n "$registry_name" ]] || {
            echo "Unable to parse ACR registry name from image: $run_task_image" >&2
            exit 1
          }

          # Prior VM builds can leave a very large Rust target directory that bloats Docker context.
          # Keep release binaries required by PM2 restarts, trim everything else.
          if [[ -d "$APP_DIR/target" ]]; then
            echo "Trimming $APP_DIR/target before az acr build to keep context small"
            if [[ -d "$APP_DIR/target/release" ]]; then
              find "$APP_DIR/target/release" -mindepth 1 -maxdepth 1 \
                ! -name rust_service \
                ! -name inbound_gateway \
                ! -name set_postmark_inbound_hook \
                ! -name inbound_fanout \
                ! -name google-docs \
                -exec rm -rf {} +
            fi
            find "$APP_DIR/target" -mindepth 1 -maxdepth 1 ! -name release -exec rm -rf {} +
          fi

          echo "Building ACI image via az acr build: $run_task_image"
          cd "$APP_ROOT"
          az acr build \
            --registry "$registry_name" \
            --image "$image_name" \
            --file Dockerfile \
            . \
            --only-show-errors
          EOF

      - name: Restart DoWhiz services
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          if [ -s /home/${{ secrets.PROD_AZURE_VM_USER }}/.nvm/nvm.sh ]; then
            source /home/${{ secrets.PROD_AZURE_VM_USER }}/.nvm/nvm.sh
          fi
          APP_DIR=/home/${{ secrets.PROD_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service
          ENV_FILE="$APP_DIR/.env"
          read_env_value() {
            local key="$1"
            local value
            value="$(grep -E "^${key}=" "$ENV_FILE" | tail -n1 | cut -d= -f2- || true)"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            printf '%s' "$value"
          }
          GATEWAY_CONFIG_PATH="$(read_env_value GATEWAY_CONFIG_PATH)"
          EMPLOYEE_CONFIG_PATH="$(read_env_value EMPLOYEE_CONFIG_PATH)"
          [[ -n "$GATEWAY_CONFIG_PATH" ]] || { echo "GATEWAY_CONFIG_PATH is required in .env" >&2; exit 1; }
          [[ -n "$EMPLOYEE_CONFIG_PATH" ]] || { echo "EMPLOYEE_CONFIG_PATH is required in .env" >&2; exit 1; }
          resolve_path() {
            local path="$1"
            if [[ "$path" = /* ]]; then
              echo "$path"
            else
              echo "$APP_DIR/$path"
            fi
          }
          GATEWAY_CONFIG_PATH_RESOLVED="$(resolve_path "$GATEWAY_CONFIG_PATH")"
          EMPLOYEE_CONFIG_PATH_RESOLVED="$(resolve_path "$EMPLOYEE_CONFIG_PATH")"
          [[ -f "$GATEWAY_CONFIG_PATH_RESOLVED" ]] || { echo "Missing gateway config: $GATEWAY_CONFIG_PATH_RESOLVED" >&2; exit 1; }
          [[ -f "$EMPLOYEE_CONFIG_PATH_RESOLVED" ]] || { echo "Missing employee config: $EMPLOYEE_CONFIG_PATH_RESOLVED" >&2; exit 1; }
          [[ "$(basename "$GATEWAY_CONFIG_PATH_RESOLVED")" == "gateway.toml" ]] || {
            echo "Expected production gateway config (gateway.toml), got: $GATEWAY_CONFIG_PATH_RESOLVED" >&2
            exit 1
          }
          [[ "$(basename "$EMPLOYEE_CONFIG_PATH_RESOLVED")" == "employee.toml" ]] || {
            echo "Expected production employee config (employee.toml), got: $EMPLOYEE_CONFIG_PATH_RESOLVED" >&2
            exit 1
          }

          set -a
          source "$ENV_FILE"
          set +a

          default_employee_id="$(awk -F'"' '/^[[:space:]]*default_employee_id[[:space:]]*=/{print $2; exit}' "$EMPLOYEE_CONFIG_PATH_RESOLVED")"
          if [[ -z "${EMPLOYEE_ID:-}" ]]; then
            EMPLOYEE_ID="$default_employee_id"
            export EMPLOYEE_ID
          fi
          [[ -n "${EMPLOYEE_ID:-}" ]] || {
            echo "EMPLOYEE_ID is missing in .env and employee config has no default_employee_id" >&2
            exit 1
          }
          if ! awk -v id="$EMPLOYEE_ID" -F'"' '
            /^[[:space:]]*id[[:space:]]*=/ {
              if ($2 == id) {
                found = 1
              }
            }
            END { exit(found ? 0 : 1) }
          ' "$EMPLOYEE_CONFIG_PATH_RESOLVED"; then
            echo "Configured EMPLOYEE_ID '$EMPLOYEE_ID' not found in $EMPLOYEE_CONFIG_PATH_RESOLVED" >&2
            exit 1
          fi

          echo "Using EMPLOYEE_ID=$EMPLOYEE_ID"
          echo "Using GATEWAY_CONFIG_PATH=$GATEWAY_CONFIG_PATH"
          echo "Using EMPLOYEE_CONFIG_PATH=$EMPLOYEE_CONFIG_PATH"

          # Ensure Azure Files mount is present before starting worker
          # so ACI tasks share workspace/memory paths correctly.
          bash "$APP_DIR/scripts/ensure_aci_share_mount.sh"

          required_bins=(
            "$APP_DIR/target/release/rust_service"
            "$APP_DIR/target/release/inbound_gateway"
          )
          for bin_path in "${required_bins[@]}"; do
            if [[ ! -x "$bin_path" ]]; then
              echo "Missing executable binary: $bin_path" >&2
              ls -al "$APP_DIR/target" 2>/dev/null || true
              ls -al "$APP_DIR/target/release" 2>/dev/null || true
              exit 1
            fi
          done

          worker_running=0
          for service in dw_worker dowhiz_rust_service dowhiz-rust-service; do
            if pm2 describe "$service" >/dev/null 2>&1; then
              if pm2 restart "$service" --update-env; then
                worker_running=1
                break
              fi
              echo "PM2 restart failed for $service, deleting stale entry and trying next option." >&2
              pm2 delete "$service" >/dev/null 2>&1 || true
            fi
          done
          if [ "$worker_running" -eq 0 ]; then
            echo "No worker process found in PM2, starting dw_worker."
            pm2 start "$APP_DIR/target/release/rust_service" --name dw_worker --cwd "$APP_DIR" -- --host 0.0.0.0 --port "${RUST_SERVICE_PORT:-9001}"
          fi

          gateway_running=0
          for service in dw_gateway dowhiz_inbound_gateway dowhiz_gateway dowhiz-inbound-gateway; do
            if pm2 describe "$service" >/dev/null 2>&1; then
              if pm2 restart "$service" --update-env; then
                gateway_running=1
                break
              fi
              echo "PM2 restart failed for $service, deleting stale entry and trying next option." >&2
              pm2 delete "$service" >/dev/null 2>&1 || true
            fi
          done
          if [ "$gateway_running" -eq 0 ]; then
            echo "No gateway process found in PM2, starting dw_gateway."
            pm2 start "$APP_DIR/target/release/inbound_gateway" --name dw_gateway --cwd "$APP_DIR"
          fi

          pm2 save
          pm2 list

          find_pm2_pid() {
            local name
            local pid
            for name in "$@"; do
              pid="$(pm2 pid "$name" | tr -d '[:space:]')"
              if [[ "$pid" =~ ^[1-9][0-9]*$ ]]; then
                echo "$pid"
                return 0
              fi
            done
            return 1
          }

          worker_pid="$(find_pm2_pid dw_worker dowhiz_rust_service dowhiz-rust-service || true)"
          gateway_pid="$(find_pm2_pid dw_gateway dowhiz_inbound_gateway dowhiz_gateway dowhiz-inbound-gateway || true)"
          [[ -n "$worker_pid" ]] || { echo "No running worker PID found after restart" >&2; exit 1; }
          [[ -n "$gateway_pid" ]] || { echo "No running gateway PID found after restart" >&2; exit 1; }

          wait_for_health() {
            local label="$1"
            local url="$2"
            local http_code=""
            local attempt
            for attempt in $(seq 1 12); do
              http_code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 8 --max-time 15 "$url" || true)"
              if [[ "$http_code" == "200" ]]; then
                printf '%s' "$http_code"
                return 0
              fi
              sleep 5
            done
            echo "$label health check failed after retries (HTTP ${http_code:-000})" >&2
            return 1
          }

          worker_health="$(wait_for_health worker "http://127.0.0.1:${RUST_SERVICE_PORT:-9001}/health")"
          gateway_health="$(wait_for_health gateway "http://127.0.0.1:${GATEWAY_PORT:-9100}/health")"
          echo "Post-restart health check passed: worker=$worker_health gateway=$gateway_health"
          EOF
