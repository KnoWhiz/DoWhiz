name: CICD_production

on:
  pull_request:
    types: [closed]
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    env:
      CARGO_INCREMENTAL: 0

    defaults:
      run:
        working-directory: DoWhiz_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Build
        run: cargo build

      - name: Run tests (scheduler_module)
        run: cargo test -p scheduler_module
        continue-on-error: true

      - name: Run tests (run_task_module)
        run: cargo test -p run_task_module
        continue-on-error: true

      - name: Clean target before release build
        run: cargo clean

      - name: Build release binaries
        run: cargo build -p scheduler_module --bins --release

      - name: Archive rust binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: |
            DoWhiz_service/target/release/rust_service
            DoWhiz_service/target/release/inbound_gateway
            DoWhiz_service/target/release/set_postmark_inbound_hook
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: ./rust-binaries

      - name: Create SSH Directory
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: Decode SSH Private Key
        run: |
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/private_key.pem
          chmod 600 ~/.ssh/private_key.pem

      - name: Add Azure VM to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.STAGING_AZURE_VM_IP }} >> ~/.ssh/known_hosts

      - name: Create SSH config file
        run: |
          echo "Host azureproduction" >> ~/.ssh/config
          echo "  HostName ${{ secrets.STAGING_AZURE_VM_IP }}" >> ~/.ssh/config
          echo "  User ${{ secrets.STAGING_AZURE_VM_USER }}" >> ~/.ssh/config
          echo "  Port 22" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/private_key.pem" >> ~/.ssh/config

      - name: Update repo and build on Azure VM
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          cd /home/${{ secrets.STAGING_AZURE_VM_USER }}/server/DoWhiz
          git checkout -f
          git checkout dev
          git pull
          mkdir -p /home/${{ secrets.STAGING_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service/target/release
          EOF

      - name: Ensure release directory is writable
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          RELEASE_DIR=/home/${{ secrets.STAGING_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service/target/release
          mkdir -p "$RELEASE_DIR"
          chmod u+rwx "$RELEASE_DIR"
          EOF

      - name: Inspect release directory (debug)
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          RELEASE_DIR=/home/${{ secrets.STAGING_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service/target/release
          echo "== whoami =="
          whoami
          echo "== id =="
          id
          echo "== ls -ald =="
          ls -ald "$RELEASE_DIR"
          echo "== ls -al =="
          ls -al "$RELEASE_DIR"
          echo "== stat =="
          stat "$RELEASE_DIR" || true
          echo "== df -h =="
          df -h "$RELEASE_DIR" || true
          EOF

      - name: Upload rust binaries to Azure VM (tmp)
        run: |
          ssh -F ~/.ssh/config azureproduction "mkdir -p /tmp/dowhiz-release"
          scp -F ~/.ssh/config ./rust-binaries/* azureproduction:/tmp/dowhiz-release/

      - name: Install rust binaries on Azure VM
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          RELEASE_DIR=/home/${{ secrets.STAGING_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service/target/release
          install -m 755 /tmp/dowhiz-release/rust_service "$RELEASE_DIR/rust_service"
          install -m 755 /tmp/dowhiz-release/inbound_gateway "$RELEASE_DIR/inbound_gateway"
          install -m 755 /tmp/dowhiz-release/set_postmark_inbound_hook "$RELEASE_DIR/set_postmark_inbound_hook"
          rm -rf /tmp/dowhiz-release
          EOF

      - name: Write staging .env on Azure VM
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          APP_DIR=/home/${{ secrets.STAGING_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service
          mkdir -p "$APP_DIR"
          COMMON_ENV_FILE="$APP_DIR/.env.common.tmp"
          TARGET_ENV_FILE="$APP_DIR/.env.target.tmp"
          cat << 'ENV_COMMON_EOF' > "$COMMON_ENV_FILE"
          ${{ secrets.ENV_COMMON }}
          ENV_COMMON_EOF
          cat << 'ENV_TARGET_EOF' > "$TARGET_ENV_FILE"
          ${{ secrets.ENV_STAGING }}
          ENV_TARGET_EOF

          ENV_FILE="$APP_DIR/.env"
          # Merge key/value pairs with target env taking precedence over common env.
          awk '
            function trim(value) {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", value);
              return value;
            }
            {
              line = $0;
              sub(/\r$/, "", line);
              if (line ~ /^[[:space:]]*($|#)/) next;
              if (line ~ /^export[[:space:]]+/) sub(/^export[[:space:]]+/, "", line);
              pos = index(line, "=");
              if (pos == 0) next;
              key = trim(substr(line, 1, pos - 1));
              if (key == "") next;
              value = substr(line, pos + 1);
              if (!(key in seen)) {
                seen[key] = 1;
                order[++count] = key;
              }
              env[key] = value;
            }
            END {
              for (i = 1; i <= count; i++) {
                key = order[i];
                print key "=" env[key];
              }
            }
          ' "$COMMON_ENV_FILE" "$TARGET_ENV_FILE" > "$ENV_FILE"
          rm -f "$COMMON_ENV_FILE" "$TARGET_ENV_FILE"

          if grep -Eq '^(STAGING_|PROD_)' "$ENV_FILE"; then
            echo "ERROR: Prefixed env keys are not allowed in deployment .env" >&2
            grep -En '^(STAGING_|PROD_)' "$ENV_FILE" >&2 || true
            exit 1
          fi
          chmod 600 "$APP_DIR/.env"
          EOF

      - name: Restart DoWhiz services
        run: |
          ssh -F ~/.ssh/config azureproduction << 'EOF'
          set -e
          if [ -s /home/${{ secrets.STAGING_AZURE_VM_USER }}/.nvm/nvm.sh ]; then
            source /home/${{ secrets.STAGING_AZURE_VM_USER }}/.nvm/nvm.sh
          fi
          APP_DIR=/home/${{ secrets.STAGING_AZURE_VM_USER }}/server/DoWhiz/DoWhiz_service
          ENV_FILE="$APP_DIR/.env"
          read_env_value() {
            local key="$1"
            local value
            value="$(grep -E "^${key}=" "$ENV_FILE" | tail -n1 | cut -d= -f2- || true)"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            printf '%s' "$value"
          }
          GATEWAY_CONFIG_PATH="$(read_env_value GATEWAY_CONFIG_PATH)"
          EMPLOYEE_CONFIG_PATH="$(read_env_value EMPLOYEE_CONFIG_PATH)"
          [[ -n "$GATEWAY_CONFIG_PATH" ]] || { echo "GATEWAY_CONFIG_PATH is required in .env" >&2; exit 1; }
          [[ -n "$EMPLOYEE_CONFIG_PATH" ]] || { echo "EMPLOYEE_CONFIG_PATH is required in .env" >&2; exit 1; }
          resolve_path() {
            local path="$1"
            if [[ "$path" = /* ]]; then
              echo "$path"
            else
              echo "$APP_DIR/$path"
            fi
          }
          GATEWAY_CONFIG_PATH_RESOLVED="$(resolve_path "$GATEWAY_CONFIG_PATH")"
          EMPLOYEE_CONFIG_PATH_RESOLVED="$(resolve_path "$EMPLOYEE_CONFIG_PATH")"
          [[ -f "$GATEWAY_CONFIG_PATH_RESOLVED" ]] || { echo "Missing gateway config: $GATEWAY_CONFIG_PATH_RESOLVED" >&2; exit 1; }
          [[ -f "$EMPLOYEE_CONFIG_PATH_RESOLVED" ]] || { echo "Missing employee config: $EMPLOYEE_CONFIG_PATH_RESOLVED" >&2; exit 1; }
          [[ "$(basename "$GATEWAY_CONFIG_PATH_RESOLVED")" == "gateway.staging.toml" ]] || {
            echo "Expected staging gateway config (gateway.staging.toml), got: $GATEWAY_CONFIG_PATH_RESOLVED" >&2
            exit 1
          }
          [[ "$(basename "$EMPLOYEE_CONFIG_PATH_RESOLVED")" == "employee.staging.toml" ]] || {
            echo "Expected staging employee config (employee.staging.toml), got: $EMPLOYEE_CONFIG_PATH_RESOLVED" >&2
            exit 1
          }

          set -a
          source "$ENV_FILE"
          set +a

          default_employee_id="$(awk -F'"' '/^[[:space:]]*default_employee_id[[:space:]]*=/{print $2; exit}' "$EMPLOYEE_CONFIG_PATH_RESOLVED")"
          if [[ -z "${EMPLOYEE_ID:-}" ]]; then
            EMPLOYEE_ID="$default_employee_id"
            export EMPLOYEE_ID
          fi
          [[ -n "${EMPLOYEE_ID:-}" ]] || {
            echo "EMPLOYEE_ID is missing in .env and employee config has no default_employee_id" >&2
            exit 1
          }
          if ! awk -v id="$EMPLOYEE_ID" -F'"' '
            /^[[:space:]]*id[[:space:]]*=/ {
              if ($2 == id) {
                found = 1
              }
            }
            END { exit(found ? 0 : 1) }
          ' "$EMPLOYEE_CONFIG_PATH_RESOLVED"; then
            echo "Configured EMPLOYEE_ID '$EMPLOYEE_ID' not found in $EMPLOYEE_CONFIG_PATH_RESOLVED" >&2
            exit 1
          fi

          echo "Using EMPLOYEE_ID=$EMPLOYEE_ID"
          echo "Using GATEWAY_CONFIG_PATH=$GATEWAY_CONFIG_PATH"
          echo "Using EMPLOYEE_CONFIG_PATH=$EMPLOYEE_CONFIG_PATH"

          # Ensure Azure Files mount is present before starting worker
          # so ACI tasks share workspace/memory paths correctly.
          bash "$APP_DIR/scripts/ensure_aci_share_mount.sh"

          # Ensure web auth bootstrap can use Playwright for Notion/Google sign-in.
          bash "$APP_DIR/scripts/install_web_auth_bootstrap_deps.sh"

          worker_running=0
          for service in dw_worker dowhiz_rust_service dowhiz-rust-service; do
            if pm2 describe "$service" >/dev/null 2>&1; then
              pm2 restart "$service" --update-env
              worker_running=1
            fi
          done
          if [ "$worker_running" -eq 0 ]; then
            echo "No worker process found in PM2, starting dw_worker."
            pm2 start "$APP_DIR/target/release/rust_service" --name dw_worker --cwd "$APP_DIR" -- --host 0.0.0.0 --port "${RUST_SERVICE_PORT:-9001}"
          fi

          gateway_running=0
          for service in dw_gateway dowhiz_inbound_gateway dowhiz_gateway dowhiz-inbound-gateway; do
            if pm2 describe "$service" >/dev/null 2>&1; then
              pm2 restart "$service" --update-env
              gateway_running=1
            fi
          done
          if [ "$gateway_running" -eq 0 ]; then
            echo "No gateway process found in PM2, starting dw_gateway."
            pm2 start "$APP_DIR/target/release/inbound_gateway" --name dw_gateway --cwd "$APP_DIR"
          fi

          pm2 save
          pm2 list
          EOF
