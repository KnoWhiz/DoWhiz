# Example ingestion gateway configuration.
# Copy to gateway.toml and adjust routes for your tenants/channels.

[server]
# host = "0.0.0.0"
# port = 9100

[defaults]
# Global fallback route if no channel-specific rule matches.
# tenant_id = "default"
# employee_id = "little_bear"

# Route rules: channel + key -> employee/tenant
# Use key = "*" to define a channel default.
[[routes]]
channel = "slack"
key = "*"
employee_id = "little_bear"
tenant_id = "default"

# Email routing by service address
[[routes]]
channel = "email"
key = "oliver@dowhiz.com"
employee_id = "little_bear"
tenant_id = "default"

# Slack routing by api_app_id (specific Slack app example)
# [[routes]]
# channel = "slack"
# key = "A12345678"
# employee_id = "boiled_egg"
# tenant_id = "acme"

# Discord ingress currently routes by bot token -> employee mapping
# (`DISCORD_BOT_TOKEN` or per-employee `*_DISCORD_BOT_TOKEN`),
# not by `gateway.toml` route keys.

# SMS routing by inbound phone number (To)
[[routes]]
channel = "sms"
key = "*"
employee_id = "little_bear"
tenant_id = "default"

# BlueBubbles routing by chat_guid
[[routes]]
channel = "bluebubbles"
key = "*"
employee_id = "little_bear"
tenant_id = "default"

# Google Docs routing by document_id (specific document)
# [[routes]]
# channel = "google_docs"
# key = "1AbCdEfGhIjKlMnOpQrStUvWxYz"
# employee_id = "little_bear"
# tenant_id = "default"

# Telegram routing by chat_id
[[routes]]
channel = "telegram"
key = "*"
employee_id = "little_bear"
tenant_id = "default"

# WhatsApp routing by phone_number
[[routes]]
channel = "whatsapp"
key = "*"
employee_id = "little_bear"
tenant_id = "default"

# Google Workspace wildcard routes - routes ALL documents to employee
# Use key = "*" for wildcard matching on any document/file ID
[[routes]]
channel = "google_docs"
key = "*"
employee_id = "little_bear"
tenant_id = "default"

[[routes]]
channel = "google_sheets"
key = "*"
employee_id = "little_bear"
tenant_id = "default"

[[routes]]
channel = "google_slides"
key = "*"
employee_id = "little_bear"
tenant_id = "default"
