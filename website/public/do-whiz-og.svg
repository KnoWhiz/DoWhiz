    <rect x="0" y="0" width="360" height="360" rx="50" fill="url(#markShine)" />
    <rect x="0" y="0" width="360" height="360" rx="50" fill="url(#markStripe)" />
    <g transform="scale(0.3515625)">
      <path
        fill="url(#markFill)"
        fill-rule="evenodd"
        d="M238 214 L404 214 C611 214 767 365 767 547 C767 722 633 855 444 855 L193 855 L238 214 Z
           M336 335 L414 335 C543 335 647 425 647 547 C647 669 543 759 414 759 L290 759 L336 335 Z"
      />
      <path
        fill="url(#markFill)"
        fill-rule="evenodd"
        d="M730 660
           m -168 0
           a 168 168 0 1 0 336 0
           a 168 168 0 1 0 -336 0
           M730 660
           m -64 0
           a 64 64 0 1 1 128 0
           a 64 64 0 1 1 -128 0"
      />
